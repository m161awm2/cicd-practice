name: Kind Kubernetes Test

on:
  pull_request:
    branches:
      - main

jobs:
  kind-ci:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          repository: m161awm2/cicd-practice

      - name: kind k8s cluster setting
        uses: helm/kind-action@v1
        with:
          cluster-name: ci-cluster
      
      - name: kind apply manifest
        run: |
          kubectl apply -f k8s/
          kubectl get nodes
          kubectl get pods -o wide
