name: install python file and execute python

on:
  push:
    branches:
      - main
jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: 레포지토리 가져오기
        uses: actions/checkout@v7
        with:
          repository: kubonmu/ci-test-python
      
      - name: 파이썬 준비
        uses: actions/setup-python@v6
      
      - name: 파이썬 코드 실행
        run: echo "3" | python3 hello.py          