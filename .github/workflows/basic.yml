name: cicd-test

on:
  push:
    branches:
      - main

jobs:
  pull-codes:
    runs-on: ubuntu-latest
    steps:
      - name: download codes
        uses: actions/checkout@v4
      - name: install nodejs
        uses: actions/setup-node@v4
      - name: mkdir-test
        run: |
          mkdir testDir
          touch testDir/helloworld.py

